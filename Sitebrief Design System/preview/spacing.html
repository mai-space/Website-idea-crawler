<!doctype html>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display:flex; gap:14px; align-items:flex-end; }
  .step  { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar   { background:var(--ink); width:14px; border-radius:2px; }
  .num   { font-family:var(--font-mono); font-size:11px; color:var(--ink-2); }
  .name  { font-family:var(--font-ui); font-size:11px; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.04em; }
</style>
<div class="card">
  <div class="scale">
    <div class="step"><div class="bar" style="height:4px"></div><div class="num">4</div><div class="name">s-1</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="num">8</div><div class="name">s-2</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="num">12</div><div class="name">s-3</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="num">16</div><div class="name">s-4</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="num">24</div><div class="name">s-5</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="num">32</div><div class="name">s-6</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="num">48</div><div class="name">s-7</div></div>
    <div class="step"><div class="bar" style="height:64px"></div><div class="num">64</div><div class="name">s-8</div></div>
    <div class="step"><div class="bar" style="height:96px"></div><div class="num">96</div><div class="name">s-9</div></div>
  </div>
  <div style="font-size:12px;color:var(--ink-3);font-family:var(--font-ui)">8-point grid · card padding 24 · row gap 12 · section padding 96</div>
</div>
