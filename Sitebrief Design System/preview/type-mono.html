<!doctype html>
<meta charset="utf-8">
<title>Mono type</title>
<link rel="stylesheet" href="_card.css">
<style>
  .specimen { font-family: var(--font-mono); }
  .meta { font-family: var(--font-mono); font-size:11px; color:var(--ink-3); margin-top:4px; }
  .row3 { display:grid; grid-template-columns: max-content 1fr; column-gap:24px; row-gap:8px; align-items:center; }
  .k { font-family: var(--font-ui); font-size:12px; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.04em; }
</style>
<div class="card">
  <div class="row3">
    <div class="k">URL</div>
    <div class="specimen" style="font-size:13px;color:var(--ink)">acme.example.com/produkte/feature-x</div>
    <div class="k">ID</div>
    <div class="specimen" style="font-size:13px;color:var(--ink-2)">brief_3f9c·2a17·8b04</div>
    <div class="k">Hours</div>
    <div class="specimen" style="font-size:13px;color:var(--ink)">16h · 8–24h range</div>
    <div class="k">Hash</div>
    <div class="specimen" style="font-size:13px;color:var(--ink-2)">a3f1c8…d2b7</div>
    <div class="k">Counts</div>
    <div class="specimen" style="font-size:13px;color:var(--ink)">1,240 pages · 92% parsed</div>
  </div>
  <div class="meta">JetBrains Mono · 400 · 13/20 · t-mono — URLs, IDs, hours, hashes, tabular numerics</div>
</div>
