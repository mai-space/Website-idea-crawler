<!doctype html>
<meta charset="utf-8">
<title>Shadows</title>
<link rel="stylesheet" href="_card.css">
<style>
  .row2 { display:flex; gap:24px; }
  .surface { flex:1; height:140px; background:var(--paper-2); border-radius:12px; display:flex; flex-direction:column; justify-content:space-between; padding:18px; }
  .name { font-family:var(--font-ui); font-size:13px; font-weight:600; }
  .num  { font-family:var(--font-mono); font-size:11px; color:var(--ink-2); }
  .s1   { box-shadow: 0 1px 2px rgba(21,23,26,0.04), 0 1px 0 rgba(21,23,26,0.02); border:1px solid var(--rule); }
  .s2   { box-shadow: 0 12px 32px -12px rgba(21,23,26,0.18), 0 2px 6px rgba(21,23,26,0.06); }
</style>
<div class="card" style="background:var(--paper);padding:32px 24px">
  <div class="row2">
    <div class="surface s1">
      <div class="name">shadow-1</div>
      <div class="num">resting · cards, panels</div>
    </div>
    <div class="surface s2">
      <div class="name">shadow-2</div>
      <div class="num">raised · modals, popovers</div>
    </div>
  </div>
</div>
