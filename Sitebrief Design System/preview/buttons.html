<!doctype html>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grp { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .btn { font-family:var(--font-ui); font-size:14px; font-weight:500; padding:10px 16px; border-radius:8px; border:1px solid transparent; cursor:pointer; transition: all 120ms cubic-bezier(0.2,0.7,0.2,1); display:inline-flex; align-items:center; gap:8px; }
  .btn-primary { background:#E2632A; color:#fff; }
  .btn-primary:hover { background:#C9551E; }
  .btn-secondary { background:var(--paper-2); color:var(--ink); border-color:var(--rule); }
  .btn-secondary:hover { background:var(--paper-0); }
  .btn-ghost { background:transparent; color:var(--ink); }
  .btn-ghost:hover { background:var(--paper-0); }
  .btn-danger { background:transparent; color:#B23F3F; border-color:#E2C5C5; }
  .btn-sm { padding:6px 10px; font-size:13px; border-radius:6px; }
  .lbl { font-family:var(--font-ui); font-size:11px; color:var(--ink-3); text-transform:uppercase; letter-spacing:0.04em; min-width:80px; }
</style>
<div class="card">
  <div class="grp"><div class="lbl">Primary</div><button class="btn btn-primary">Run crawl</button><button class="btn btn-primary btn-sm">Accept brief</button></div>
  <div class="grp"><div class="lbl">Secondary</div><button class="btn btn-secondary">Configure</button><button class="btn btn-secondary btn-sm">Defer</button></div>
  <div class="grp"><div class="lbl">Ghost</div><button class="btn btn-ghost">Cancel</button><button class="btn btn-ghost btn-sm">Reject</button></div>
  <div class="grp"><div class="lbl">Danger</div><button class="btn btn-danger">Delete site</button></div>
</div>
