<!doctype html>
<meta charset="utf-8">
<title>Paper & Ink</title>
<link rel="stylesheet" href="_card.css">
<style>
  .swatch { flex:1; border-radius:8px; padding:14px; display:flex; flex-direction:column; justify-content:space-between; min-height:96px; border:1px solid var(--rule); }
  .swatch .name { font-size:13px; font-weight:600; }
  .swatch .hex  { font-family: var(--font-mono); font-size:11px; opacity:0.7; }
</style>
<div class="card">
  <div class="row">
    <div class="swatch" style="background:#F7F3EC; color:#15171A">
      <div class="name">paper</div>
      <div><div class="hex">#F7F3EC</div><div class="tok" style="color:inherit;opacity:0.6">--paper</div></div>
    </div>
    <div class="swatch" style="background:#FFFFFF; color:#15171A">
      <div class="name">paper-2</div>
      <div><div class="hex">#FFFFFF</div><div class="tok" style="color:inherit;opacity:0.6">--paper-2</div></div>
    </div>
    <div class="swatch" style="background:#EFEAE0; color:#15171A">
      <div class="name">paper-0</div>
      <div><div class="hex">#EFEAE0</div><div class="tok" style="color:inherit;opacity:0.6">--paper-0</div></div>
    </div>
  </div>
  <div class="row">
    <div class="swatch" style="background:#15171A; color:#F7F3EC">
      <div class="name">ink</div>
      <div><div class="hex">#15171A</div><div class="tok" style="color:inherit;opacity:0.6">--ink</div></div>
    </div>
    <div class="swatch" style="background:#5B6068; color:#F7F3EC">
      <div class="name">ink-2</div>
      <div><div class="hex">#5B6068</div><div class="tok" style="color:inherit;opacity:0.6">--ink-2</div></div>
    </div>
    <div class="swatch" style="background:#9099A2; color:#FFFFFF">
      <div class="name">ink-3</div>
      <div><div class="hex">#9099A2</div><div class="tok" style="color:inherit;opacity:0.75">--ink-3</div></div>
    </div>
    <div class="swatch" style="background:#E2DCD0; color:#15171A">
      <div class="name">rule</div>
      <div><div class="hex">#E2DCD0</div><div class="tok" style="color:inherit;opacity:0.6">--rule</div></div>
    </div>
  </div>
</div>
