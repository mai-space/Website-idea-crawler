<meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap:14px; }
  .ic { display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px; border:1px solid var(--rule); border-radius:8px; background:var(--paper-2); }
  .ic svg { width:20px; height:20px; stroke:var(--ink); }
  .ic .l { font-family:var(--font-mono); font-size:10px; color:var(--ink-3); }
  .sizes { display:flex; gap:14px; align-items:flex-end; padding-top:8px; }
  .sz { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .sz .l { font-family:var(--font-mono); font-size:10px; color:var(--ink-3); }
</style>
