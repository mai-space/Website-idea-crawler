<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sitebrief — Dashboard</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <link rel="icon" href="../../assets/mark.svg">
  <style>
    body{margin:0;background:var(--paper);}
    @keyframes sb-pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="Topbar.jsx"></script>
  <script type="text/babel" src="SiteTile.jsx"></script>
  <script type="text/babel" src="SiteFleet.jsx"></script>
  <script type="text/babel" src="QueueMonitor.jsx"></script>
  <script type="text/babel" src="PitchCard.jsx"></script>
  <script type="text/babel" src="FilterBar.jsx"></script>
  <script type="text/babel" src="BriefInbox.jsx"></script>
  <script type="text/babel">
    const App = () => (
      <div style={{display:'flex',minHeight:'100vh',background:'var(--paper)'}} data-screen-label="Dashboard overview">
        <Sidebar/>
        <main style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
          <Topbar/>
          <div style={{padding:'32px',display:'grid',gridTemplateColumns:'1fr 320px',gap:32,alignItems:'flex-start',maxWidth:1440,margin:'0 auto',width:'100%',boxSizing:'border-box'}}>
            <div style={{display:'flex',flexDirection:'column',gap:40,minWidth:0}}>
              <SiteFleet/>
              <BriefInbox/>
            </div>
            <div style={{position:'sticky',top:80,display:'flex',flexDirection:'column',gap:16}}>
              <QueueMonitor/>
            </div>
          </div>
        </main>
      </div>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
