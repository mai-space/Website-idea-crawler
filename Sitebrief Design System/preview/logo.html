<!doctype html>
<meta charset="utf-8">
<title>Logo</title>
<link rel="stylesheet" href="_card.css">
<div class="card" style="gap:20px">
  <div style="display:flex;gap:24px;align-items:center;padding:20px 24px;background:var(--paper-2);border:1px solid var(--rule);border-radius:12px">
    <img src="../assets/logo.svg" style="height:36px" alt="Sitebrief logo">
  </div>
  <div style="display:flex;gap:24px;align-items:center;padding:20px 24px;background:var(--ink);border-radius:12px">
    <img src="../assets/logo-reverse.svg" style="height:36px" alt="Sitebrief logo reversed">
  </div>
  <div style="display:flex;gap:16px;align-items:center">
    <img src="../assets/mark.svg" style="width:48px;height:48px" alt="mark">
    <img src="../assets/mark.svg" style="width:32px;height:32px" alt="mark">
    <img src="../assets/mark.svg" style="width:24px;height:24px" alt="mark">
    <img src="../assets/mark.svg" style="width:16px;height:16px" alt="mark">
    <span class="label" style="margin-left:8px">stand-alone mark — favicon, app icon, dense corner mark</span>
  </div>
</div>
